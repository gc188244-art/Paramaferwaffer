<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corazón de Neón - I Love You</title>
    <style>
        /* Estilos generales para pantalla completa */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let W, H, CX, CY, SCALE;
        
        // Ajuste de resolución para pantallas de alta densidad (celulares)
        const DPR = Math.min(window.devicePixelRatio || 1, 2);
        const text = "I love you";
        const points = [];
        const TOTAL = 95; // Cantidad de textos que forman el corazón

        function resize() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W * DPR;
            canvas.height = H * DPR;
            
            // Escalado del contexto para que se vea nítido
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(DPR, DPR);
            
            CX = W / 2;
            CY = H / 2 + (Math.min(W, H) * 0.05);
            SCALE = Math.min(W, H) * 0.014;
            buildPoints();
        }

        // Ecuación matemática del corazón
        function heart(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return {
                x: x * SCALE,
                y: -y * SCALE
            };
        }

        function buildPoints() {
            points.length = 0;
            for (let i = 0; i < TOTAL; i++) {
                const t = (i / TOTAL) * Math.PI * 2;
                points.push({
                    baseT: t,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        function glowText(txt, x, y, angle, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.font = `bold ${size}px Arial, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // Resplandor tipo Neón
            ctx.shadowBlur = 18;
            ctx.shadowColor = "rgba(255, 120, 190, 0.95)";
            ctx.fillStyle = "#ff78be"; // Rosa neón
            ctx.fillText(txt, 0, 0);
            
            // Núcleo blanco para dar brillo intenso
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff";
            ctx.fillText(txt, 0, 0);
            
            ctx.restore();
        }

        function draw() {
            // Fondo semitransparente para crear el efecto de estela (rastro)
            ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
            ctx.fillRect(0, 0, W, H);

            const time = Date.now() * 0.002;

            points.forEach((p) => {
                // Pequeña oscilación para que el corazón parezca que late o flota
                const t = p.baseT + Math.sin(time + p.phase) * 0.04;
                const pos = heart(t);
                
                // Las letras giran ligeramente siguiendo la forma del corazón
                const angle = t + Math.PI / 2 + Math.cos(time + p.phase) * 0.15;
                const size = 11 + Math.sin(time + p.phase) * 6;
                
                glowText(text, CX + pos.x, CY + pos.y, angle, size);
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener("resize", resize);
        resize();
        draw();
    </script>
</body>
</html>
